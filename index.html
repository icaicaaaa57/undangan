<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invitation</title>
<style>
body{
  margin:0;
  height:100vh;
  font-family:'Segoe UI',sans-serif;
  background:url('background.jpg') no-repeat center center;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:15vh; /* posisi agak ke bawah */
  text-align:center;
}

.overlay{
  background:rgba(0,0,0,0.4);
  width:85%;
  max-width:500px;
  padding:40px 25px;
  border-radius:25px;
  color:white;
}

/* tulisan Dear */
.overlay div:first-child{
  font-size:5vw;
  letter-spacing:1px;
}

/* nama tamu */
.guest{
  font-size:7vw;
  font-weight:600;
  margin:20px 0;
}

/* tombol */
button{
  background:white;
  color:black;
  border:none;
  padding:14px 35px;
  border-radius:40px;
  cursor:pointer;
  font-size:5vw;
  font-weight:500;
  transition:0.3s;
}

button:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<div class="overlay">
  <div>Dear</div>
  <div class="guest" id="guestName">Tamu Undangan</div>
  <button onclick="openInvitation()">Open Invitation</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const guest = params.get("to");

if(guest){
  document.getElementById("guestName").innerText = guest.replace(/\+/g, " ");
}

function openInvitation(){
  window.location.href = "https://sites.google.com/view/aurelsuyuf/home";
}
</script>

</body>
</html>
